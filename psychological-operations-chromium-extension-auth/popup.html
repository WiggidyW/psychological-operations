<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="title">X-App credentials</div>
    <hr />
    <form id="x_app_form">
      <label>Consumer Key
        <input id="bf_client_id" type="text" autocomplete="off" spellcheck="false" />
      </label>
      <label>Secret Key
        <input id="bf_client_secret" type="password" autocomplete="off" spellcheck="false" />
      </label>
      <label>Bearer Token
        <input id="bf_bearer_token" type="password" autocomplete="off" spellcheck="false" />
      </label>
      <button id="bf_save" type="submit">Save credentials</button>
    </form>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
